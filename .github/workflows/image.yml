name: Build and Push Image

# main 푸시(또는 vX.Y.Z 태그)마다 Docker 이미지를 빌드해 GitHub Container Registry(ghcr.io)에
# 올린다. 배포 VM은 이 이미지를 pull 만 하면 되므로, 사양이 낮은 VM에서 무거운 빌드를 하지 않는다.
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-push:
    name: Build image and push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 이미지 이름은 소문자여야 한다(GHCR 요구). metadata-action이 repository 이름을
      # 소문자로 변환하고, latest/커밋 SHA/시맨틱 버전 태그를 자동으로 붙인다.
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=semver,pattern={{version}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions 캐시로 다음 빌드를 빠르게 한다.
          cache-from: type=gha
          cache-to: type=gha,mode=max
